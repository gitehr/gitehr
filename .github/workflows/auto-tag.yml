name: Auto-tag on version bump

# When a push to main bumps the version in Cargo.toml, create and push the
# matching `v<version>` tag, then invoke the release workflow with that tag.
#
# The release workflow is invoked via `workflow_call` rather than by relying on
# the tag push to trigger it, because pushes performed via the default
# GITHUB_TOKEN do not trigger downstream workflows.

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Detect version bump and create tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      bumped: ${{ steps.bump.outputs.bumped }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Detect Cargo.toml version change
        id: bump
        run: |
          new=$(grep -m1 '^version = "' Cargo.toml | cut -d'"' -f2)
          old=$(git show HEAD~1:Cargo.toml 2>/dev/null \
                  | grep -m1 '^version = "' | cut -d'"' -f2 || echo "")

          if [ -z "$new" ]; then
            echo "::warning::Could not read version from Cargo.toml"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$new" = "$old" ]; then
            echo "No version change ($new == $old) - nothing to tag."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tag="v$new"
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists - assuming a previous run created it."
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Cargo.toml: $old -> $new"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.bump.outputs.bumped == 'true'
        run: |
          tag="${{ steps.bump.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"

  release:
    needs: tag
    if: needs.tag.outputs.bumped == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit

  publish-crate:
    needs:
      - tag
      - release
    if: needs.tag.outputs.bumped == 'true'
    uses: ./.github/workflows/publish-crates.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
    secrets: inherit
