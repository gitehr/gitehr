# Publishes the CLI crate after a successful release. The auto-tag workflow
# invokes this explicitly because tags created with GITHUB_TOKEN do not trigger
# tag-push workflows.

name: Publish to crates.io

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.3.2"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish gitehr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build release binary
        run: cargo build --release --locked

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Verify crates.io package
        run: cargo publish --dry-run --locked --package gitehr

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --package gitehr
