# Publishes the CLI crate after a successful release. The auto-tag workflow
# invokes this explicitly because tags created with GITHUB_TOKEN do not trigger
# tag-push workflows.

name: Publish to crates.io

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.3.2"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish gitehr
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
          persist-credentials: false

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - name: Build release binary
        run: cargo build --release --locked

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Verify crates.io package
        run: cargo publish --dry-run --locked --package gitehr

      - name: Authenticate with crates.io
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo publish --locked --package gitehr
