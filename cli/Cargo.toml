[package]
name = "gitehr"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "A Git-based Electronic Health Record system - CLI tool"

[[bin]]
name = "gitehr"
path = "src/main.rs"

[dependencies]
# Workspace dependencies
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
chrono.workspace = true
uuid.workspace = true
sha2.workspace = true
clap.workspace = true

# CLI-specific dependencies
clap_complete = "4.6"
fs_extra = "1"
rand = "0.10"
which = "8.0"
walkdir = "2.5"
tar = "0.4"
flate2 = "1.0"

# MCP integration
gitehr-mcp = { path = "../mcp" }
tokio.workspace = true
tracing = "0.1"

# Clinical calculators: `gitehr calc` reuses the calc-cli library verbatim
calc-cli = { path = "../calc-cli" }

[dev-dependencies]
tempfile.workspace = true
regex = "1"
serial_test = "3"

[features]
server = []

[lib]
name = "gitehr"
path = "src/lib.rs"
