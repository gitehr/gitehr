# Trial config. gitehr depends on the calc crates via a git rev, so it cannot be
# published to crates.io yet. Disable cargo publish; release-plz still manages
# the version, CHANGELOG.md, the git tag, and the GitHub Release. Changelog
# layout (per-crate vs a single root file) can be tuned once we see a Release PR.
[workspace]
publish = false
