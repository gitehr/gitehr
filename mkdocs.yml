# site
site_name: GitEHR
site_url: https://gitehr.org/

# repo
repo_url: https://github.com/gitehr/gitehr
repo_name: gitehr/gitehr
edit_uri: edit/main/docs/

nav:
  - Home:
      - Welcome: index.md
      - About:
          - The GitEHR Story: about/the-gitehr-story.md
          - The Town of SQLby: about/sqlby.md
          - Contributors: about/contributors.md
          - Foundation: about/foundation.md
      - Glossary: glossary.md
      - References: references/references.md
  - Design:
      - Overview: design/design.md
      - Files, not databases: design/files-not-databases.md
      - Common objections: design/common-objections.md
      - Patient-mediated extraction: design/patient-mediated-extraction.md
      - Patient Centricity: design/patient-centricity.md
      - Structure: design/structure.md
      - Repository structure: design/repository-structure.md
      - Audit Trail: design/audit-trail.md
      - Provenance: design/provenance.md
      - Forensics: design/forensics.md
      - Security: design/security.md
      - Redundancy: design/redundancy.md
      - Portability: design/portability.md
      - No Lock-in: design/no-lock-in.md
      - Longevity: design/longevity.md
      - Simplicity: design/simplicity.md
  - Install:
      - Overview: install/install.md
      - CLI: install/cli.md
      - GUI: install/gui.md
  - CLI:
      - Overview: cli/cli.md
      - store: cli/store.md
      - config: cli/config.md
      - journal: cli/journal.md
      - document: cli/document.md
      - import: cli/import.md
      - state: cli/state.md
      - demographics: cli/demographics.md
      - allergies: cli/allergies.md
      - vaccinations: cli/vaccinations.md
      - user: cli/user.md
      - remote: cli/remote.md
      - status: cli/status.md
      - encrypt: cli/encrypt.md
      - decrypt: cli/decrypt.md
      - transport: cli/transport.md
      - gui: cli/gui.md
      - upgrade: cli/upgrade.md
      - version: cli/version.md
      - completions: cli/completions.md
      - plugins: cli/plugins.md
      - Developer workflow: cli/developer-workflow.md
      - MCP usage: cli/mcp-usage.md
  - GUI:
      - Overview: gui/gui.md
      - Quick start: gui/quick-start.md
  - TUI:
      - Overview: tui/tui.md
  - Safety:
      - Overview: safety/safety.md

copyright: >
  GitEHR is copyright &copy; 2022-26 Baw Medical Ltd, licensed under <a rel="license" href="https://creativecommons.org/licenses/by-sa/4.0/">CC-BY-SA 4.0</a> (GitEHR concepts and data) or <a rel="license" href="https://www.gnu.org/licenses/agpl-3.0.en.html">AGPL-3.0</a> (GitEHR code).

theme:
  variant: modern
  logo: assets/images/gitehr-logo.svg
  favicon: assets/images/gitehr-logo.svg
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
