<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="title description">
  <title id="title">A patient record shared as independent repository copies</title>
  <desc id="description">A patient, GP practice, hospital, and pharmacy each hold a complete copy of one patient's GitEHR record repository and exchange changes through Git.</desc>
  <style>
    .heading { fill: #273024; font: 700 28px sans-serif; }
    .subheading { fill: #5c6458; font: 18px sans-serif; }
    .label { fill: #273024; font: 700 19px sans-serif; text-anchor: middle; }
    .note { fill: #5c6458; font: 16px sans-serif; text-anchor: middle; }
    .organisation { fill: #f6f5f1; stroke: #5f663e; stroke-width: 3; }
    .record { fill: #7b8453; stroke: #526030; stroke-width: 3; }
    .record-text { fill: #ffffff; font: 700 20px sans-serif; text-anchor: middle; }
    .sync { stroke: #7b8453; stroke-width: 4; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7b8453" />
    </marker>
  </defs>

  <rect width="1200" height="600" rx="24" fill="#fbfbf8" />
  <text x="600" y="55" class="heading" text-anchor="middle">One patient record, held as independent complete copies</text>
  <text x="600" y="85" class="subheading" text-anchor="middle">Care organisations and the patient exchange changes without a central record database</text>

  <line x1="600" y1="300" x2="600" y2="165" class="sync" marker-start="url(#arrow)" />
  <line x1="600" y1="300" x2="310" y2="390" class="sync" marker-start="url(#arrow)" />
  <line x1="600" y1="300" x2="890" y2="390" class="sync" marker-start="url(#arrow)" />
  <line x1="600" y1="300" x2="600" y2="500" class="sync" marker-start="url(#arrow)" />

  <rect x="490" y="105" width="220" height="80" rx="16" class="organisation" />
  <text x="600" y="142" class="label">Patient</text>
  <text x="600" y="166" class="note">complete record copy</text>

  <rect x="185" y="390" width="250" height="80" rx="16" class="organisation" />
  <text x="310" y="427" class="label">GP practice</text>
  <text x="310" y="451" class="note">complete record copy</text>

  <rect x="765" y="390" width="250" height="80" rx="16" class="organisation" />
  <text x="890" y="427" class="label">Hospital</text>
  <text x="890" y="451" class="note">complete record copy</text>

  <rect x="490" y="495" width="220" height="80" rx="16" class="organisation" />
  <text x="600" y="532" class="label">Pharmacy</text>
  <text x="600" y="556" class="note">complete record copy</text>

  <path d="M545 240 h92 l28 28 v92 h-120 z" class="record" />
  <path d="M637 240 v28 h28" fill="none" stroke="#fbfbf8" stroke-width="3" />
  <path d="M565 292 h80 M565 318 h80" stroke="#fbfbf8" stroke-width="5" stroke-linecap="round" />
  <text x="605" y="355" class="record-text">GitEHR record</text>
</svg>
